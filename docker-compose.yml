version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: skillsync-database
    environment:
      POSTGRES_USER: skillsync_user
      POSTGRES_PASSWORD: skillsync_password
      POSTGRES_DB: skillsync_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsync_user -d skillsync_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillsync-backend
    environment:
      DATABASE_URL: postgresql://skillsync_user:skillsync_password@database:5432/skillsync_db
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # React Frontend — served by nginx which also proxies /api to the backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillsync-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - skillsync-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# Custom Docker network connecting all three containers
networks:
  skillsync-network:
    driver: bridge
    name: skillsync-network

# Persistent volume for PostgreSQL data
volumes:
  postgres_data:
    name: skillsync-postgres-data
