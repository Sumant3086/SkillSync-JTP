# Render Blueprint for SkillSync
# Uses external Supabase PostgreSQL (free, always-on)

services:
  # Main web service (combines frontend + backend)
  - type: web
    name: skillsync
    env: docker
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: DATABASE_URL
        sync: false
        # Set this manually in Render dashboard with your Supabase connection string
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
    healthCheckPath: /api/health
